version: '3.8'

services:
  # Dịch vụ cơ sở dữ liệu MySQL
  database:
    image: mysql:8.0
    container_name: trustty-database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: trustty123
      MYSQL_DATABASE: QuanLyNhanSu
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # init.sql chỉ tạo bảng (DDL), không có dữ liệu mẫu
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptrustty123"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Dịch vụ seed dữ liệu mẫu — chạy một lần sau khi DB sẵn sàng
  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trustty-seeder
    # restart: no — chỉ chạy một lần duy nhất
    restart: "no"
    command: node /database/seed.js
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: trustty123
      DB_NAME: QuanLyNhanSu
      # Trỏ đến seed-data.js được mount vào container
      SEED_DATA_PATH: /database/seed-data.js
    volumes:
      # Mount thư mục database vào container để seed.js đọc được seed-data.js
      - ./database:/database
    depends_on:
      database:
        condition: service_healthy

  # Dịch vụ Backend Node.js
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trustty-backend
    restart: unless-stopped
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: trustty123
      DB_NAME: QuanLyNhanSu
      JWT_SECRET: trustty_jwt_secret_key_production_2024
      JWT_EXPIRES_IN: 8h
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      database:
        condition: service_healthy

  # Dịch vụ Frontend React + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trustty-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
    driver: local
